name: Translate ar

on:
  repository_dispatch:
    types:
      - translate-ar-release
  schedule:
    - cron: "47 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    uses: ./.github/workflows/translate-locale-reusable.yml
    with:
      locale: ar
      locale_slug: ar
    secrets: inherit
